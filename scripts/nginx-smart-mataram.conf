server {
    listen 80;
    server_name DOMAIN_ANDA.com www.DOMAIN_ANDA.com;

    # Redirect HTTP ke HTTPS (aktif setelah SSL dipasang)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name DOMAIN_ANDA.com www.DOMAIN_ANDA.com;

    # SSL — diisi otomatis oleh Certbot
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_ANDA.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_ANDA.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Upload file besar (foto inspeksi)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
